name: portfolio
description: "Benjamin Agardh's portfolio website"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
    
  flutter_markdown: ^0.7.5
  go_router: ^17.1.0
  intl: ^0.20.1
  markdown: ^7.3.0
  timelines_plus: ^1.0.6
  url_launcher: ^6.3.1
  collection: ^1.19.0
  json_annotation: ^4.9.0
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  flutter_m3shapes: ^1.0.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  test: ^1.25.8
  build_runner: ^2.3.3
  json_serializable: ^6.8.0

  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/projects/
    - assets/me/
    - assets/writing/
    - assets/icons/
  
  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/open_sans/OpenSans-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/open_sans/OpenSans-Italic-VariableFont_wdth,wght.ttf
          style: italic